<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuria Login</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --card: rgba(255,255,255,0.78);
      --border: #d2d2d7;
      --primary: #1d1d1f;
      --link: #0071e3;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #b91c1c;
      --ok-bg: #ecfdf5;
      --ok-border: #a7f3d0;
      --ok-text: #047857;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at 20% 0%, #ffffff 0%, var(--bg) 45%), var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(430px, 100%);
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 28px;
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 45px rgba(17, 24, 39, 0.12);
      padding: 28px;
    }

    h1 {
      margin: 6px 0 8px;
      font-size: 32px;
      letter-spacing: -0.02em;
    }

    .muted { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
    .brand { color: var(--muted); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 14px;
      color: #3a3a3c;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #8e8e93;
      box-shadow: 0 0 0 3px rgba(142, 142, 147, 0.2);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .link {
      background: transparent;
      color: var(--link);
      padding: 8px 0;
      margin-top: 6px;
    }

    .otp-wrap {
      margin-top: 10px;
      padding-top: 4px;
      display: none;
    }

    .otp-wrap.show {
      display: block;
    }

    .msg {
      margin-top: 10px;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      display: none;
    }

    .msg.error { display: block; background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
    .msg.ok { display: block; background: var(--ok-bg); border: 1px solid var(--ok-border); color: var(--ok-text); }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">Recuria</div>
    <h1>Sign in</h1>
    <p class="muted">Continue to your clinical assistant workspace.</p>

    <div id="error" class="msg"></div>
    <div id="ok" class="msg"></div>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@clinic.com" required />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter your password" required />

    <button id="forgotBtn" class="link" type="button">Forgot password?</button>

    <section id="otpWrap" class="otp-wrap">
      <label for="otp">OTP verification</label>
      <input id="otp" type="text" placeholder="Enter OTP from email" />
      <div class="actions">
        <button id="verifyOtpBtn" class="primary" type="button">Verify OTP</button>
        <button id="cancelOtpBtn" class="secondary" type="button">Cancel</button>
      </div>
    </section>

    <div class="actions">
      <button id="loginBtn" class="primary" type="button">Sign in</button>
      <button id="signupBtn" class="secondary" type="button">Sign up</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = "https://rttugjwsfmbihrviwbfn.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0dHVnandzZm1iaWhydml3YmZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzODQxMDksImV4cCI6MjA4NTk2MDEwOX0.0Wjf4EswFsqI2lV41yMwqSL2MRe6qQ-k5tFl_Jevgjk";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const otpEl = document.getElementById("otp");

    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");
    const forgotBtn = document.getElementById("forgotBtn");
    const verifyOtpBtn = document.getElementById("verifyOtpBtn");
    const cancelOtpBtn = document.getElementById("cancelOtpBtn");
    const otpWrap = document.getElementById("otpWrap");

    const errorEl = document.getElementById("error");
    const okEl = document.getElementById("ok");

    const showError = (text) => {
      errorEl.textContent = text;
      errorEl.className = "msg error";
      okEl.className = "msg";
    };

    const showOk = (text) => {
      okEl.textContent = text;
      okEl.className = "msg ok";
      errorEl.className = "msg";
    };

    const resetButtons = () => {
      loginBtn.disabled = false;
      signupBtn.disabled = false;
      forgotBtn.disabled = false;
      verifyOtpBtn.disabled = false;
      loginBtn.textContent = "Sign in";
      signupBtn.textContent = "Sign up";
      forgotBtn.textContent = "Forgot password?";
      verifyOtpBtn.textContent = "Verify OTP";
    };

    loginBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const password = passwordEl.value;
      if (!email || !password) return showError("Please enter both email and password.");

      loginBtn.disabled = true;
      signupBtn.disabled = true;
      forgotBtn.disabled = true;
      loginBtn.textContent = "Signing in...";

      const { error } = await client.auth.signInWithPassword({ email, password });
      resetButtons();

      if (error) return showError("User not signed in, no worries. Please check your details and try again.");
      showOk("Signed in successfully.");
      setTimeout(() => {
        window.location.href = "https://recuria-neww.vercel.app";
      }, 500);
    });

    signupBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const password = passwordEl.value;
      if (!email || !password) return showError("Please enter email and password to create an account.");

      signupBtn.disabled = true;
      loginBtn.disabled = true;
      forgotBtn.disabled = true;
      signupBtn.textContent = "Creating...";

      const { error } = await client.auth.signUp({ email, password });
      resetButtons();

      if (error) return showError(error.message || "Sign up could not be completed right now.");
      showOk("Sign up successful. Please verify your email if prompted.");
    });

    forgotBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      if (!email) return showError("Enter your email first.");

      forgotBtn.disabled = true;
      forgotBtn.textContent = "Sending OTP...";

      const { error } = await client.auth.resetPasswordForEmail(email);
      resetButtons();

      if (error) return showError(error.message || "Could not send OTP right now.");
      otpWrap.classList.add("show");
      showOk("OTP sent. Enter the code to continue.");
    });

    verifyOtpBtn.addEventListener("click", async () => {
      const email = emailEl.value.trim();
      const token = otpEl.value.trim();
      if (!email || !token) return showError("Enter email and OTP to verify.");

      verifyOtpBtn.disabled = true;
      verifyOtpBtn.textContent = "Verifying...";

      const { error } = await client.auth.verifyOtp({
        email,
        token,
        type: "recovery"
      });

      resetButtons();

      if (error) return showError("OTP verification failed. Please try again.");
      showOk("OTP verified. Redirecting...");
      setTimeout(() => {
        window.location.href = "https://recuria-neww.vercel.app";
      }, 500);
    });

    cancelOtpBtn.addEventListener("click", () => {
      otpWrap.classList.remove("show");
      otpEl.value = "";
      showOk("OTP verification canceled.");
    });
  </script>
</body>
</html>
